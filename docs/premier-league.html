<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RVFA Premier League</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="league" data-league="premier-league">
    <main class="page">
      <nav class="site-nav" aria-label="RVFA pages">
        <a href="./index.html">Home</a>
        <a href="./overall.html">RVFA Overall</a>
        <a href="./premier-league.html" aria-current="page">Premier League</a>
        <a href="./championship.html">Championship</a>
        <a href="./charter.html">Charter</a>
      </nav>

      <header class="hero">
        <p class="eyebrow">RVFA Division</p>
        <h1>Premier League</h1>
        <p id="generated-at">Loading data...</p>
      </header>

      <section class="card">
        <div class="section-heading">
          <h2>Standings</h2>
          <p id="league-count">Loading teams...</p>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th><span class="th-long">Rank</span><span class="th-short">#</span></th>
                <th>Team</th>
                <th><span class="th-long">Manager</span><span class="th-short">Mgr</span></th>
                <th>Total</th>
                <th><span class="th-long">Latest GW</span><span class="th-short">GW</span></th>
                <th>Chip</th>
                <th><span class="th-long">Last Rank</span><span class="th-short">Prev</span></th>
              </tr>
            </thead>
            <tbody id="league-standings"></tbody>
          </table>
        </div>
      </section>

      <section class="card">
        <div class="section-heading">
          <h2>Cup</h2>
          <p id="cup-status">Loading cup data...</p>
        </div>
        <div id="cup-matchups"></div>
      </section>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
