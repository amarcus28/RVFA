<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RVFA Overall</title>
    <link rel="icon" href="./data/images/pl_logo.png" type="image/png" />
    <link rel="apple-touch-icon" href="./data/images/pl_logo.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="overall">
    <div class="page">
      <header class="site-header">
        <div class="site-header-inner">
          <a class="site-brand" href="./index.html" aria-label="The RVFA home">
            <img
              class="site-logo"
              src="./data/images/pl_logo.jpg"
              alt=""
              width="52"
              height="52"
              decoding="async"
            />
            <span class="site-brand-text">The RVFA</span>
          </a>
          <nav class="site-nav site-nav--desktop" aria-label="RVFA pages">
            <a href="./index.html">Home</a>
            <a href="./overall.html" aria-current="page">RVFA Overall</a>
            <a href="./premier-league.html">Premier League</a>
            <a href="./championship.html">Championship</a>
            <a href="./charter.html">Rules &amp; Prizes</a>
          </nav>
          <div class="site-nav-mobile">
            <label for="site-nav-jump" class="site-nav-jump-label">Leagues menu</label>
            <select id="site-nav-jump" class="site-nav-jump" aria-label="Jump to league">
              <option value="">Leagues…</option>
              <option value="./overall.html">RVFA Overall</option>
              <option value="./premier-league.html">Premier League</option>
              <option value="./championship.html">Championship</option>
            </select>
            <nav class="site-nav site-nav--tray" aria-label="Other pages">
              <a href="./index.html">Home</a>
              <a href="./charter.html">Rules &amp; Prizes</a>
            </nav>
          </div>
        </div>
      </header>
      <main class="site-main">
      <header class="hero">
        <p class="eyebrow">Overall</p>
        <h1>The RVFA</h1>
        <p id="generated-at">Loading data...</p>
      </header>

      <section class="card">
        <div class="section-heading">
          <h2>Combined League</h2>
          <p>Premier League and Championship together</p>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th><span class="th-long">Rank</span><span class="th-short">#</span></th>
                <th>Team</th>
                <th><span class="th-long">Divisions</span><span class="th-short">Div</span></th>
                <th>Total</th>
                <th><span class="th-long">Latest GW</span><span class="th-short">GW</span></th>
                <th>Chip</th>
              </tr>
            </thead>
            <tbody id="combined-standings"></tbody>
          </table>
        </div>
      </section>

      <section class="card">
        <div class="section-heading">
          <h2>Cups</h2>
          <p id="cup-status">Loading cup data...</p>
        </div>
        <div id="cup-matchups"></div>
      </section>
    </main>
    </div>

    <script src="./site-header.js" defer></script>
    <script src="./app.js" type="module"></script>
  </body>
</html>
